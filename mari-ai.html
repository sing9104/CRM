<!DOCTYPE html>
<html lang="en">
<head>
  <script src="auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mari AI - CRM Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * {
      font-family: 'DM Sans', sans-serif;
    }
    body {
      background-color: #f8f8fa;
    }

    /* Chat animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scaleY(0.5);
        opacity: 0.5;
      }
      40% {
        transform: scaleY(1);
        opacity: 1;
      }
    }

    .message {
      animation: fadeIn 0.3s ease-in-out;
    }

    .typing-dot {
      animation: bounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    .chat-messages::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .success-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background-color: #dcfce7;
      color: #166534;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .card-field {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .card-field:last-child {
      border-bottom: none;
    }

    .card-field-label {
      color: #6b7280;
      font-size: 0.875rem;
    }

    .card-field-value {
      color: #111827;
      font-weight: 500;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    .data-table th {
      background-color: #f3f4f6;
      color: #374151;
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #e5e7eb;
    }

    .data-table td {
      padding: 0.75rem;
      border-bottom: 1px solid #e5e7eb;
      color: #374151;
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .btn-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background-color: #1a1a2e;
      color: white;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background-color 0.2s;
    }

    .btn-link:hover {
      background-color: #0a0a0a;
    }
  </style>
</head>
<body class="bg-gray-50">

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Top Header Bar -->
      <header class="bg-white border-b border-gray-200 border-t-2 border-gray-900 h-14 flex items-center justify-between px-6">
        <h1 class="text-gray-900 font-semibold">Mari AI</h1>
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-blue-100 text-blue-600 flex items-center justify-center text-xs font-bold rounded" style="border-radius: 8px;">JS</div>
          <span class="text-sm text-gray-700">Jaspinder Singh</span>
        </div>
      </header>

      <!-- Chat Container -->
      <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Welcome Section (shown initially) -->
        <div id="welcomeSection" class="flex-1 flex flex-col items-center justify-center p-6">
          <div class="w-20 h-20 mb-6 flex items-center justify-center rounded-full" style="background: linear-gradient(135deg, #111827, #1f2937);">
            <i data-lucide="sparkles" class="w-10 h-10 text-white"></i>
          </div>
          <h2 class="text-3xl font-bold text-gray-900 mb-2">Hi Jaspinder, I'm Mari AI</h2>
          <p class="text-gray-500 text-sm text-center mb-8 max-w-lg">Your intelligent CRM assistant. I can query data, create deals & opportunities, send payment links, booking confirmations, and more.</p>
          <div class="grid grid-cols-2 gap-3 w-full max-w-2xl">
            <button onclick="sendSuggestion('Create a new Deal for Red Global at Taste of London for 20 tickets on Thursday evening')" class="p-3.5 rounded-xl text-left transition-all hover:shadow-md bg-white border border-gray-200 hover:border-gray-300">
              <div class="flex items-start gap-2.5">
                <div class="w-8 h-8 bg-emerald-50 text-emerald-600 flex items-center justify-center rounded-lg flex-shrink-0">
                  <i data-lucide="handshake" class="w-4 h-4"></i>

                </div>

            </button>
            <button onclick="sendSuggestion('Create a new Opportunity for Tech Summit 2026')" class="p-3.5 rounded-xl text-left transition-all hover:shadow-md bg-white border border-gray-200 hover:border-gray-300">
              <div class="flex items-start gap-2.5">
                <div class="w-8 h-8 bg-violet-50 text-violet-600 flex items-center justify-center rounded-lg flex-shrink-0">

              <div class="flex items-start gap-2.5">
                <div class="w-8 h-8 bg-blue-50 text-blue-600 flex items-center justify-center rounded-lg flex-shrink-0">
                  <i data-lucide="link-2" class="w-4 h-4"></i>
                </div>
                <div>
                  <p class="text-xs font-medium text-gray-900">Send a Payment Link</p>
                  <p class="text-[10px] text-gray-400 mt-0.5">Generate & send to client</p>
                </div>
              </div>
            </button>
            <button onclick="sendSuggestion('Show me all deals currently In Play status with their values')" class="p-3.5 rounded-xl text-left transition-all hover:shadow-md bg-white border border-gray-200 hover:border-gray-300">
              <div class="flex items-start gap-2.5">
                <div class="w-8 h-8 bg-amber-50 text-amber-600 flex items-center justify-center rounded-lg flex-shrink-0">
                  <i data-lucide="search" class="w-4 h-4"></i>
                </div>
                <div>
                  <p class="text-xs font-medium text-gray-900">Query CRM Data</p>

                </div>

            </button>

        <!-- Chat Messages Area (hidden initially) -->
        <div id="chatArea" class="hidden flex-1 overflow-hidden">
          <div id="chatMessages" class="chat-messages h-full p-6 space-y-4 overflow-y-auto">
          </div>
        </div>

        <!-- Input Area (always visible) -->
        <div class="bg-white border-t border-gray-200 px-6 py-4">
          <div class="max-w-4xl mx-auto">
            <div class="flex gap-3">
              <input
                type="text"
                id="messageInput"
                placeholder="Ask Mari AI anything... Create a deal, query data, send confirmations..."
                class="flex-1 px-4 py-3 text-sm rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-400 bg-gray-50"
              />
              <button
                onclick="sendMessage()"
                class="w-11 h-11 bg-gray-900 text-white rounded-xl flex items-center justify-center hover:bg-gray-800 transition-colors flex-shrink-0"
              >
                <i data-lucide="arrow-up" class="w-5 h-5"></i>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let messages = [];
    let hasStartedChat = false;

    function refreshIcons() { lucide.createIcons(); }
    refreshIcons();

    document.getElementById('messageInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;

      if (!hasStartedChat) {
        hasStartedChat = true;
        document.getElementById('welcomeSection').classList.add('hidden');
        document.getElementById('chatArea').classList.remove('hidden');
        messages.push({ type: 'ai', text: "Hello Jaspinder! I'm Mari AI, your CRM assistant. How can I help you today?" });
        renderMessages();
      }

      messages.push({ type: 'user', text: message });
      renderMessages();
      input.value = '';

      // Show typing, then status steps, then final answer
      showProgressResponse(message);
    }

    function sendSuggestion(text) {
      document.getElementById('messageInput').value = text;
      sendMessage();
    }

    async function showProgressResponse(message) {
      const response = generateAIResponse(message);

      // Phase 1: Show typing indicator
      messages.push({ type: 'typing' });
      renderMessages();
      await delay(800);

      // Phase 2: Show status steps one by one
      if (response.steps && response.steps.length > 0) {
        messages.pop(); // remove typing
        for (let i = 0; i < response.steps.length; i++) {
          messages.push({ type: 'status', text: response.steps[i], done: false });
          renderMessages();
          await delay(600 + Math.random() * 800);
          messages[messages.length - 1].done = true;
          renderMessages();
          await delay(200);
        }
        // Brief typing before final answer
        messages.push({ type: 'typing' });
        renderMessages();
        await delay(1200 + Math.random() * 1000);
        messages.pop();
      } else {
        // Simple response — just hold typing a bit longer
        await delay(1500 + Math.random() * 1000);
        messages.pop();
      }

      // Phase 3: Show final answer
      messages.push({ type: 'ai', html: response.html, text: response.text });
      renderMessages();
      refreshIcons();
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    function generateAIResponse(message) {
      const lm = message.toLowerCase();

      // --- CREATE DEAL ---
      if (lm.includes('create') && lm.includes('deal')) {
        return {
          steps: [
            'Parsing deal details from your request...',
            'Looking up customer "Red Global" in CRM...',
            'Matching property "Taste of London" — found 3 upcoming sessions...',
            'Selecting Thursday evening session — 20 tickets available...',
            'Calculating pricing: 20 × £210.00 = £4,200.00...',
            'Creating deal record and assigning to your pipeline...'
          ],
          html: `
            <div class="success-badge"><i data-lucide="check-circle" class="w-4 h-4"></i> Deal Created Successfully</div>
            <p class="text-sm text-gray-600 mb-3">I've created a new deal for <strong>Red Global</strong> at <strong>Taste of London</strong>. Here's the summary:</p>
            <div class="bg-white rounded-lg p-4 border border-gray-200">
              <div class="card-field"><span class="card-field-label">Deal Name</span><span class="card-field-value">TOL26: RED GLOBAL x20 THU EVE</span></div>
              <div class="card-field"><span class="card-field-label">Deal ID</span><span class="card-field-value" style="font-family: monospace; font-size: 0.8rem;">D-134892</span></div>
              <div class="card-field"><span class="card-field-label">Customer</span><span class="card-field-value">Red Global</span></div>
              <div class="card-field"><span class="card-field-label">Property</span><span class="card-field-value">Taste of London 2026</span></div>
              <div class="card-field"><span class="card-field-label">Session</span><span class="card-field-value">Thursday 19th June (evening 17:30–21:30)</span></div>
              <div class="card-field"><span class="card-field-label">Package</span><span class="card-field-value">Summer Garden Party Package</span></div>
              <div class="card-field"><span class="card-field-label">Tickets</span><span class="card-field-value">20</span></div>
              <div class="card-field"><span class="card-field-label">Unit Price</span><span class="card-field-value">£210.00</span></div>
              <div class="card-field"><span class="card-field-label">Total Inventory</span><span class="card-field-value" style="font-weight: 700;">£4,200.00</span></div>
              <div class="card-field"><span class="card-field-label">Status</span><span class="card-field-value" style="color: #ea580c;">In Play</span></div>
              <div class="card-field"><span class="card-field-label">Probability</span><span class="card-field-value">10%</span></div>
              <div class="card-field"><span class="card-field-label">Lead Salesperson</span><span class="card-field-value">Jaspinder Singh</span></div>
              <div class="card-field"><span class="card-field-label">Business Unit</span><span class="card-field-value">Art & Entertainment</span></div>
              <div class="card-field"><span class="card-field-label">Currency</span><span class="card-field-value">£ GBP — British Pound</span></div>
            </div>
            <p class="text-xs text-gray-400 mt-3">1 inventory line item added. Sales contact and billing contact have been pulled from the Red Global account record. You can edit the deal details or add additional inventory items from the deal page.</p>
            <div class="mt-3 flex gap-2">
              <a href="deal-detail.html" class="btn-link">View Deal <i data-lucide="arrow-right" class="w-4 h-4"></i></a>
              <button class="btn-link" style="background-color: #f3f4f6; color: #374151;">Add Inventory <i data-lucide="package" class="w-4 h-4"></i></button>
            </div>`
        };
      }

      // --- CREATE OPPORTUNITY ---
      if (lm.includes('create') && lm.includes('opportunity')) {
        return {
          steps: [
            'Analysing opportunity details from your request...',
            'Searching CRM for matching accounts and contacts...',
            'Setting up opportunity pipeline stage...',
            'Assigning default probability based on stage...',
            'Creating opportunity record...'
          ],
          html: `
            <div class="success-badge"><i data-lucide="check-circle" class="w-4 h-4"></i> Opportunity Created Successfully</div>
            <p class="text-sm text-gray-600 mb-3">New opportunity has been created and added to your pipeline. I've assigned it to the <strong>Prospecting</strong> stage with a default 25% probability — you can adjust this as conversations progress.</p>
            <div class="bg-white rounded-lg p-4 border border-gray-200">
              <div class="card-field"><span class="card-field-label">Opportunity Name</span><span class="card-field-value">Tech Summit 2026</span></div>
              <div class="card-field"><span class="card-field-label">Account</span><span class="card-field-value">Digital Innovations Ltd</span></div>
              <div class="card-field"><span class="card-field-label">Primary Contact</span><span class="card-field-value">James Whitfield (VP Events)</span></div>
              <div class="card-field"><span class="card-field-label">Stage</span><span class="card-field-value" style="color: #7c3aed;">Prospecting</span></div>
              <div class="card-field"><span class="card-field-label">Probability</span><span class="card-field-value">25%</span></div>
              <div class="card-field"><span class="card-field-label">Estimated Value</span><span class="card-field-value" style="font-weight: 700;">$45,000</span></div>
              <div class="card-field"><span class="card-field-label">Expected Close</span><span class="card-field-value">30/06/2026</span></div>
              <div class="card-field"><span class="card-field-label">Owner</span><span class="card-field-value">Jaspinder Singh</span></div>
              <div class="card-field"><span class="card-field-label">Property</span><span class="card-field-value">Global Tech Summit — ExCel London</span></div>
              <div class="card-field"><span class="card-field-label">Source</span><span class="card-field-value">Inbound — Website Enquiry</span></div>
            </div>
            <p class="text-xs text-gray-400 mt-3">Next steps: I'd recommend scheduling a discovery call with James Whitfield to understand their hospitality requirements. Would you like me to draft an outreach email?</p>
            <div class="mt-3 flex gap-2">
              <a href="opportunity-detail.html" class="btn-link">View Opportunity <i data-lucide="arrow-right" class="w-4 h-4"></i></a>
              <button class="btn-link" style="background-color: #f3f4f6; color: #374151;">Draft Email <i data-lucide="mail" class="w-4 h-4"></i></button>
            </div>`
        };
      }

      // --- PAYMENT LINK ---
      if (lm.includes('payment') || lm.includes('payment link')) {
        return {
          steps: [
            'Looking up invoice INV-2026-0042...',
            'Found: £1,260.00 outstanding — Red Global, Taste of London deal...',
            'Generating secure Stripe payment link...',
            'Composing email notification to billing contact...',
            'Sending payment link to red.accounts@redglobal.com...'
          ],
          html: `
            <p class="text-sm text-gray-600 mb-3">Payment link has been generated via <strong>Stripe</strong> and sent to the billing contact at Red Global. The client will receive an email with a secure link to complete the payment.</p>
            <div class="bg-white rounded-lg p-4 border border-gray-200">
              <div class="card-field"><span class="card-field-label">Invoice</span><span class="card-field-value">INV-2026-0042</span></div>
              <div class="card-field"><span class="card-field-label">Deal</span><span class="card-field-value">TOL26: RED GLOBAL x30 WED EVE</span></div>
              <div class="card-field"><span class="card-field-label">Amount Due</span><span class="card-field-value" style="font-weight: 700;">£1,260.00</span></div>
              <div class="card-field"><span class="card-field-label">Payment Methods</span><span class="card-field-value">Card, Bank Transfer</span></div>
              <div class="card-field"><span class="card-field-label">Sent To</span><span class="card-field-value">red.accounts@redglobal.com</span></div>
              <div class="card-field"><span class="card-field-label">Link Status</span><span class="card-field-value" style="color: #0891b2;">Active — Pending Payment</span></div>
              <div class="card-field"><span class="card-field-label">Expires</span><span class="card-field-value">13 April 2026 (48 hours)</span></div>
              <div class="card-field"><span class="card-field-label">Stripe Reference</span><span class="card-field-value" style="font-family: monospace; font-size: 0.75rem;">pi_3R5kL2CZ...x8Qm</span></div>
            </div>
            <p class="text-xs text-gray-400 mt-3">I'll notify you when the payment is completed. If it isn't paid within 24 hours, would you like me to send an automatic reminder?</p>
            <div class="mt-3 flex gap-2">
              <button class="btn-link">Copy Payment Link <i data-lucide="copy" class="w-4 h-4"></i></button>
              <button class="btn-link" style="background-color: #f3f4f6; color: #374151;">View Invoice <i data-lucide="file-text" class="w-4 h-4"></i></button>
            </div>`
        };
      }

      // --- BOOKING CONFIRMATION ---
      if (lm.includes('booking') || lm.includes('confirmation')) {
        return {
          steps: [
            'Retrieving deal and event details...',
            'Generating booking confirmation document...',
            'Attaching table plan and menu selections...',
            'Sending confirmation to sales contact and billing contact...'
          ],
          html: `

    function renderMessages() {
      const container = document.getElementById('chatMessages');
      container.innerHTML = '';
      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'message flex gap-3';

        if (msg.type === 'ai') {
          div.classList.add('justify-start');
          div.innerHTML = `<div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center" style="background: #1a1a2e;"><i data-lucide="sparkles" class="w-4 h-4 text-white"></i></div><div class="flex-1 max-w-2xl"><div class="bg-gray-100 rounded-2xl p-4 text-gray-800 text-sm leading-relaxed">${msg.html || `<p>${msg.text}</p>`}</div></div>`;

        } else if (msg.type === 'user') {
          div.classList.add('justify-end');
          div.innerHTML = `<div class="flex-1 max-w-md lg:max-w-xl"><div class="bg-gray-900 rounded-2xl p-4 text-white text-sm"><p>${msg.text}</p></div></div><div class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs font-bold">JS</div>`;

        } else if (msg.type === 'typing') {
          div.classList.add('justify-start');
          div.innerHTML = `<div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center" style="background: #1a1a2e;"><i data-lucide="sparkles" class="w-4 h-4 text-white"></i></div><div class="flex-1"><div class="bg-gray-100 rounded-2xl p-4 inline-flex gap-1.5 items-center"><span class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></span><span class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></span><span class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></span></div></div>`;

        } else if (msg.type === 'status') {
          div.classList.add('justify-start');
          const icon = msg.done
            ? '<i data-lucide="check" class="w-3 h-3 text-emerald-500"></i>'
            : '<span class="w-3 h-3 border-2 border-gray-300 border-t-gray-600 rounded-full animate-spin inline-block"></span>';
          const textColor = msg.done ? 'text-gray-400' : 'text-gray-600';
          div.innerHTML = `<div class="flex-shrink-0 w-8 h-8"></div><div class="flex-1"><div class="flex items-center gap-2 py-0.5"><span class="flex-shrink-0">${icon}</span><span class="text-xs ${textColor}">${msg.text}</span></div></div>`;
        }

        container.appendChild(div);
      });
      setTimeout(() => { container.scrollTop = container.scrollHeight; }, 0);
      refreshIcons();
    }
